<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>
        Promise
    </h1>
    <script>
        const foodorder = new Promise((resolve, reject) => {
            let delivered = false;
            setTimeout(() => {
                
            if (delivered) {
                resolve("Promise resolved!");
            } else {
                reject("Promise rejected!");
            }
        }, 2000);
        });


        foodorder.then((message) => {
            console.log(message);
        }).catch((error)=>{
            console.log(error);
        })
    </script>
</body>
</html>
