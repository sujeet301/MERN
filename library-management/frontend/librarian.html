<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librarian Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav>
  <h1>📚 Library — Librarian Panel</h1>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('borrows')">Borrow Records</div>
    <div class="tab"        onclick="switchTab('books')">Manage Books</div>
  </div>

  <!-- Borrow Records -->
  <div id="borrows">
    <div class="section-title">All Borrow Records</div>
    <table>
      <thead>
        <tr><th>Student</th><th>Email</th><th>Book</th><th>Borrowed On</th><th>Status</th><th>Action</th></tr>
      </thead>
      <tbody id="borrowTable"><tr><td colspan="6">Loading...</td></tr></tbody>
    </table>
  </div>

  <!-- Manage Books -->
  <div id="books" style="display:none">
    <div class="section-title">Add New Book</div>
    <div class="add-form">
      <input type="text" id="newTitle"  placeholder="Book title"/>
      <input type="text" id="newAuthor" placeholder="Author name"/>
      <button onclick="addBook()">+ Add Book</button>
    </div>

    <div class="section-title">All Books</div>
    <table>
      <thead>
        <tr><th>Title</th><th>Author</th><th>Status</th></tr>
      </thead>
      <tbody id="bookTable"><tr><td colspan="3">Loading...</td></tr></tbody>
    </table>
  </div>
</div>
<div id="toast"></div>

<script>
  const API  = 'http://localhost:5000/api';
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || user.role !== 'librarian') window.location.href = 'login.html';

  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (error ? ' error' : '');
    setTimeout(() => t.className = '', 3000);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((el, i) =>
      el.classList.toggle('active', (i === 0) === (tab === 'borrows'))
    );
    document.getElementById('borrows').style.display = tab === 'borrows' ? '' : 'none';
    document.getElementById('books').style.display   = tab === 'books'   ? '' : 'none';
    if (tab === 'books') loadBooks();
  }

  async function loadBorrows() {
    const res     = await fetch(`${API}/librarian/borrows`, { credentials: 'include' });
    const borrows = await res.json();
    const tbody   = document.getElementById('borrowTable');
    if (!borrows.length) { tbody.innerHTML = '<tr><td colspan="6">No records found.</td></tr>'; return; }
    tbody.innerHTML = borrows.map(b => `
      <tr>
        <td>${b.student.name}</td>
        <td>${b.student.email}</td>
        <td>${b.book.title} <small style="color:#888">by ${b.book.author}</small></td>
        <td>${new Date(b.borrowedAt).toLocaleDateString()}</td>
        <td><span class="badge ${b.returned ? 'returned' : 'borrowed'}">${b.returned ? 'Returned' : 'Not Returned'}</span></td>
        <td>
          ${!b.returned
            ? `<button class="btn-return" style="padding:5px 12px;border:none;border-radius:5px;cursor:pointer;font-weight:600;color:#fff;background:#38a169"
                       onclick="markReturn('${b._id}')">Mark Returned</button>`
            : `<span style="color:#888;font-size:.85rem">✓ Done</span>`}
        </td>
      </tr>`).join('');
  }

  async function markReturn(borrowId) {
    const res  = await fetch(`${API}/librarian/return/${borrowId}`, { method: 'PATCH', credentials: 'include' });
    const data = await res.json();
    showToast(data.message, !res.ok);
    if (res.ok) loadBorrows();
  }

  async function loadBooks() {
    const res   = await fetch(`${API}/librarian/books`, { credentials: 'include' });
    const books = await res.json();
    const tbody = document.getElementById('bookTable');
    if (!books.length) { tbody.innerHTML = '<tr><td colspan="3">No books added yet.</td></tr>'; return; }
    tbody.innerHTML = books.map(b => `
      <tr>
        <td>${b.title}</td>
        <td>${b.author}</td>
        <td><span class="badge ${b.available ? 'available' : 'borrowed'}">${b.available ? 'Available' : 'Borrowed'}</span></td>
      </tr>`).join('');
  }

  async function addBook() {
    const title  = document.getElementById('newTitle').value.trim();
    const author = document.getElementById('newAuthor').value.trim();
    if (!title || !author) return showToast('Enter both title and author', true);

    const res  = await fetch(`${API}/librarian/books`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ title, author })
    });
    const data = await res.json();
    if (!res.ok) return showToast(data.message, true);

    showToast(`"${data.title}" added!`);
    document.getElementById('newTitle').value  = '';
    document.getElementById('newAuthor').value = '';
    loadBooks();
  }

  async function logout() {
    await fetch(`${API}/auth/logout`, { method: 'POST', credentials: 'include' });
    localStorage.removeItem('user');
    window.location.href = 'login.html';
  }

  loadBorrows();
</script>
</body>
</html>
