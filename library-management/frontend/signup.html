<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Library</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <h2>📚 Create Account</h2>
    <p>Register to access the library</p>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Doe"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="student">Student</option>
        <option value="librarian">Librarian</option>
      </select>
    </div>
    <button class="btn" onclick="signup()">Create Account</button>

    <div class="link-row">Already have an account? <a href="login.html">Sign In</a></div>
  </div>
</div>
<div id="toast"></div>

<script>
  const API = 'http://localhost:5000/api';

  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (error ? ' error' : '');
    setTimeout(() => t.className = '', 3000);
  }

  async function signup() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role     = document.getElementById('role').value;
    if (!name || !email || !password) return showToast('Fill in all fields', true);

    const res  = await fetch(`${API}/auth/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ name, email, password, role })
    });
    const data = await res.json();
    if (!res.ok) return showToast(data.message, true);

    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = data.user.role === 'librarian' ? 'librarian.html' : 'student.html';
  }
</script>
</body>
</html>
