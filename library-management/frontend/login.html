<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Library</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <h2>📚 Library System</h2>
    <p>Sign in to your account</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <button class="btn" onclick="login()">Sign In</button>

    <div class="link-row">Don't have an account? <a href="signup.html">Sign Up</a></div>
  </div>
</div>
<div id="toast"></div>

<script>
  const API = 'http://localhost:5000/api';

  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (error ? ' error' : '');
    setTimeout(() => t.className = '', 3000);
  }

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showToast('Fill in all fields', true);

    const res  = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) return showToast(data.message, true);

    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = data.user.role === 'librarian' ? 'librarian.html' : 'student.html';
  }
</script>
</body>
</html>
