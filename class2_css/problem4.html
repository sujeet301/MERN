<!DOCTYPE html>
<html>
<head>
    <title>Responsive Color Box</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        .box{
            width: 300px;
            height: 300px;
            margin: auto;
            background-color: red;
            color: white;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        
        @media (max-width: 600px){
            .box{
                background-color: blue !important;; 
                border-radius: 50%;
            }
        }

        
        @media (min-width: 601px) and (max-width: 1024px){
            .box{
                background-color: green;
                border-radius: 25%;
            }
        }

        
        @media (min-width: 1025px){
            .box{
                background-color: red;
            }
        }
    </style>
</head>

<body>

    <h1>Responsive Color Box</h1>

    <div class="box">
        Color Box
    </div>

</body>
</html>
