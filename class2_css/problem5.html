<!DOCTYPE html>
<html>
<head>
    <title>Position Challenge</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        h1{
            text-align: center;
            color: darkgreen;
            position: sticky;
            top: 10px;
            z-index: 1000;

        }

        /* Parent Box */
        .parent{
            width: 500px;
            height: 300px;
            background-color: lightblue;
            border: 3px solid navy;
            margin: 50px auto;
            position: relative;
        }

        /* Child Box */
        .child{
            width: 120px;
            height: 80px;
            background-color: orange;
            color: white;
            text-align: center;
            line-height: 80px;
            position: absolute;
            bottom: 10px;
            right: 10px;
        }

        /* Fixed Button */
        .chat-btn{
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Position Challenge</h1>

    <div class="parent">
        Parent Box

        <div class="child">
            Child Box
        </div>
    </div>

    <button class="chat-btn">
        Chat
