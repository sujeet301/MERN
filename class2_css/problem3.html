<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Layouts</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2{
            color: darkblue;
        }

        /* Task 1 */
        .row{
            display: flex;
            justify-content: space-evenly;
            margin-bottom: 40px;
        }

        /* Common Box Style */
        .box{
            width: 100px;
            height: 100px;
            background-color: royalblue;
            color: white;
            text-align: center;
            line-height: 100px;
            border-radius: 10px;
        }

        /* Task 2 */
        .center-container{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            background-color: #f4f4f4;
            margin-bottom: 40px;
        }

        /* Task 3 */
        .wrap-container{
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .wrap-box{
            width: 120px;
            height: 120px;
            background-color: orange;
            color: white;
            text-align: center;
            line-height: 120px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h2>1. Three Boxes with Equal Spacing</h2>

    <div class="row">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>

    <h2>2. Centered Box</h2>

    <div class="center-container">
        <div class="box">Center</div>
    </div>

    <h2>3. Six Boxes with Wrapping</h2>

    <div class="wrap-container">
        <div class="wrap-box">1</div>
        <div class="wrap-box">2</div>
        <div class="wrap-box">3</div>
        <div class="wrap-box">4</div>
        <div class="wrap-box">5</div>
        <div class="wrap-box">6</div>
    </div>

</body>
</html>
