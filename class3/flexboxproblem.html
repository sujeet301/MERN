<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Pricing Cards</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:50px 20px;
}

.pricing-container{
    display:flex;
    justify-content:center;
    align-items:stretch;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    width:280px;
    background:#fff;
    border-radius:15px;
    padding:40px 25px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.card h2{
    font-size:28px;
    margin-bottom:10px;
}

.price{
    font-size:50px;
    font-weight:bold;
    margin-bottom:15px;
}

.card p{
    font-size:18px;
    margin-bottom:5px;
}

.btn{
    margin-top:30px;
    padding:14px 25px;
    border:none;
    border-radius:8px;
    background:#0b132b;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.featured{
    background:#4f46e5;
    color:white;
    transform:scale(1.05);
}

.featured .btn{
    background:#0b132b;
}

/* Responsive */
@media(max-width:900px){
    .pricing-container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>

<body>

<div class="pricing-container">

    <div class="card">
        <div>
            <h2>Basic</h2>
            <div class="price">₹499</div>
            <p>5 Projects</p>
            <p>Email Support</p>
        </div>

        <button class="btn">Choose Plan</button>
    </div>

    <div class="card featured">
        <div>
            <h2>Pro</h2>
            <div class="price">₹999</div>
            <p>20 Projects</p>
            <p>Priority Support</p>
        </div>

        <button class="btn">Choose Plan</button>
    </div>

    <div class="card">
        <div>
            <h2>Enterprise</h2>
            <div class="price">₹1999</div>
            <p>Unlimited Projects</p>
            <p>24/7 Support</p>
        </div>

        <button class="btn">Choose Plan</button>
    </div>

</div>

</body>
</html>
