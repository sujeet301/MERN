<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magazine Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.grid-layout{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-template-rows:250px 250px;
    gap:20px;
}

.card{
    border-radius:15px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    transition:0.4s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.content{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    padding:15px;
    color:white;
    background:linear-gradient(
        transparent,
        rgba(0,0,0,0.8)
    );
}

.content h2,
.content h3{
    margin-bottom:5px;
}


.featured{
    grid-column:1 / 3;
    grid-row:1 / 3;
}


@media(max-width:768px){

    .grid-layout{
        grid-template-columns:1fr;
        grid-template-rows:auto;
    }

    .featured{
        grid-column:auto;
        grid-row:auto;
        height:350px;
    }

    .card{
        height:250px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="grid-layout">

        <div class="card featured">
            <img src="https://picsum.photos/800/600?random=1" alt="">
            <div class="content">
                <h2>Featured Article</h2>
                <p>Latest trends in web design and development.</p>
            </div>
        </div>

       
        <div class="card">
            <img src="https://picsum.photos/400/300?random=2" alt="">
            <div class="content">
                <h3>Technology</h3>
                <p>Future innovations.</p>
            </div>
        </div>

       
        <div class="card">
            <img src="https://picsum.photos/400/300?random=3" alt="">
            <div class="content">
                <h3>Travel</h3>
                <p>Explore new places.</p>
            </div>
        </div>

        
        <div class="card">
            <img src="https://picsum.photos/400/300?random=4" alt="">
            <div class="content">
                <h3>Lifestyle</h3>
                <p>Healthy living tips.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/300?random=5" alt="">
            <div class="content">
                <h3>Business</h3>
                <p>Market insights.</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
