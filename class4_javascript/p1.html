<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function calculateSalary(salary, exp) {
        var bonus;

        if (exp > 5) {
          bonus = salary * 0.1;
        } else {
          bonus = salary * 0.05;
        }

        var finalSalary = salary + bonus;
        console.log(finalSalary);
      }
      calculateSalary(50000, 3);
    </script>
  </body>
</html>
